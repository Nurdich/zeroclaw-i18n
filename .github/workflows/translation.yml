name: ZeroClaw 翻译更新

on:
  # 每天早上 8 点自动运行
  schedule:
    - cron: '0 0 * * *'
  # 也可以手动触发
  workflow_dispatch:
  # 当上游 zeroclaw 发布新版本时触发
  release:
    types: [published]
  # 当上游仓库有更新时触发
  push:
    branches:
      - main
    paths:
      - '.github/workflows/translation.yml'

env:
  UPSTREAM_REPO: "zeroclaw-labs/zeroclaw"

jobs:
  check-and-translate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: 检查环境
        run: |
          echo "开始 ZeroClaw 翻译更新..."
          echo "日期: $(date)"

      - name: 检出代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: 拉取上游最新代码
        run: |
          # 克隆上游仓库
          if [ ! -d "../zeroclaw" ]; then
            git clone https://github.com/${{ env.UPSTREAM_REPO }}.git ../zeroclaw
          else
            cd ../zeroclaw
            git fetch origin
            git checkout main
            git pull origin main
          fi
          cd ${{ github.workspace }}
          echo "上游代码已更新"

      - name: 设置 LOCAL_SOURCE
        run: |
          echo "LOCAL_SOURCE=$(pwd)/../zeroclaw" >> $GITHUB_ENV

      - name: 应用翻译
        run: |
          cd ${{ github.workspace }}
          python3 sync_translations.py --apply --source ../zeroclaw
          echo "翻译已应用"

      - name: 检查更改
        id: changes
        run: |
          cd ${{ github.workspace }}
          git status --porcelain
          if [ -n "$(git status --porcelain)" ]; then
            echo "有更改需要提交"
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "没有新更改"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: 提交翻译更改
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          cd ${{ github.workspace }}
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 添加所有更改
          git add -A
          
          # 创建提交
          git commit -m "翻译更新: $(date '+%Y-%m-%d %H:%M')"
          
          echo "提交已创建"

      - name: 编译测试
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          cd ../zeroclaw
          cargo build --release
          echo "编译测试通过"

      - name: 推送更改
        if: steps.changes.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await git.push({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: 'main',
                force: true
              });
              console.log('翻译已推送');
            } catch (e) {
              console.log('推送失败:', e);
            }

      - name: 创建 Pull Request
        if: steps.changes.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: 'main'
            });
            
            if (prs.length === 0) {
              await github.rest.pulls.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '翻译更新: ' + new Date().toLocaleDateString('zh-CN'),
                body: '自动翻译更新\n\n日期: ' + new Date().toLocaleString('zh-CN'),
                head: 'main',
                base: 'main'
              });
              console.log('已创建 PR');
            } else {
              console.log('PR 已存在');
            }

  notify:
    needs: check-and-translate
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: 发送通知
        run: |
          echo "翻译更新任务完成"
          echo "状态: ${{ needs.check-and-translate.result }}"
