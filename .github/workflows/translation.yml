name: ZeroClaw 中文翻译

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  release:
    types: [published]

env:
  UPSTREAM_REPO: "zeroclaw-labs/zeroclaw"

jobs:
  translate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 拉取上游代码
        run: |
          git clone https://github.com/${{ env.UPSTREAM_REPO }}.git ../zeroclaw

      - name: 应用翻译
        run: |
          cd ../zeroclaw
          python3 ${{ github.workspace }}/apply_translations.py

      - name: 检查更改
        id: changes
        run: |
          cd ../zeroclaw
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: 提交翻译更改
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          cd ../zeroclaw
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          git commit -m "中文翻译更新: $(date '+%Y-%m-%d %H:%M')"
          git push origin main

  build:
    needs: translate
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 拉取上游代码（含翻译）
        run: |
          git clone https://github.com/${{ env.UPSTREAM_REPO }}.git ../zeroclaw

      - name: 再次应用翻译（确保最新）
        run: |
          cd ../zeroclaw
          python3 ${{ github.workspace }}/apply_translations.py
          git checkout main

      - name: 设置 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 编译
        working-directory: ../zeroclaw
        run: cargo build --release --locked

      - name: 创建发布
        if: steps.changes.outputs.has_changes == 'true'
        working-directory: ../zeroclaw
        run: |
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.1.8")
          cd target/release
          tar -czvf zeroclaw-$VERSION-linux-x64.tar.gz zeroclaw
          echo "::set-output name=version::$VERSION"
        id: version

      - name: 上传发布
        if: steps.changes.outputs.has_changes == 'true'
        working-directory: ../zeroclaw/target/release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version }}-zh
          name: ZeroClaw 中文版 ${{ steps.version.outputs.version }}
          body: |
            ZeroClaw 中文翻译版本

            包含所有 CLI 命令、状态输出、守护进程消息的中文翻译。

            下载后添加执行权限: `chmod +x zeroclaw`
          files: zeroclaw-${{ steps.version.outputs.version }}-linux-x64.tar.gz
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
